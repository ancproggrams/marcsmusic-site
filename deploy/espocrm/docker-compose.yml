services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${ESPOCRM_DB_ROOT_PASSWORD:-change-root-password}
      MARIADB_DATABASE: ${ESPOCRM_DB_NAME:-espocrm}
      MARIADB_USER: ${ESPOCRM_DB_USER:-espocrm}
      MARIADB_PASSWORD: ${ESPOCRM_DB_PASSWORD:-change-db-password}
    volumes:
      - espocrm-db:/var/lib/mysql

  espocrm:
    image: espocrm/espocrm:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8080:80"
    environment:
      ESPOCRM_DATABASE_HOST: mariadb
      ESPOCRM_DATABASE_NAME: ${ESPOCRM_DB_NAME:-espocrm}
      ESPOCRM_DATABASE_USER: ${ESPOCRM_DB_USER:-espocrm}
      ESPOCRM_DATABASE_PASSWORD: ${ESPOCRM_DB_PASSWORD:-change-db-password}
      ESPOCRM_ADMIN_USERNAME: ${ESPOCRM_ADMIN_USERNAME:-admin}
      ESPOCRM_ADMIN_PASSWORD: ${ESPOCRM_ADMIN_PASSWORD:-change-admin-password}
      ESPOCRM_SITE_URL: ${ESPOCRM_SITE_URL:-https://crm.marcsmusic.nl}
    volumes:
      - espocrm-data:/var/www/html

volumes:
  espocrm-db:
  espocrm-data:
