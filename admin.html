<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarcsMusic Admin</title>
  <style>
    :root {
      --bg: #151315;
      --panel: #211b20;
      --line: #443a42;
      --ink: #ffffff;
      --muted: #bcb5ba;
      --cta: #f34340;
      --good: #65d98b;
      --warn: #ffd166;
      --font: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
    }

    a {
      color: inherit;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 0;
    }

    .token-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    input,
    button {
      min-height: 42px;
      border-radius: 0;
      font: inherit;
    }

    input {
      min-width: min(360px, 100%);
      flex: 1;
      border: 1px solid var(--line);
      background: #111;
      color: var(--ink);
      padding: 0 12px;
    }

    button {
      border: 0;
      background: var(--cta);
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge {
      display: inline-block;
      padding: 4px 7px;
      border: 1px solid var(--line);
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.confirmed {
      border-color: var(--good);
      color: var(--good);
    }

    .badge.pending_payment,
    .badge.paid_calendar_pending {
      border-color: var(--warn);
      color: var(--warn);
    }

    .cancel-btn {
      min-height: 34px;
      padding: 0 10px;
      background: transparent;
      border: 1px solid var(--cta);
      color: var(--cta);
    }

    @media (max-width: 720px) {
      header {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>MarcsMusic Admin</h1>
      <a href="/">Terug naar site</a>
    </header>

    <form class="token-form" data-token-form>
      <input type="password" name="token" placeholder="Admin token" autocomplete="current-password" required>
      <button type="submit">Load bookings</button>
      <p class="status" data-status></p>
    </form>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Status</th>
            <th>Datum</th>
            <th>Type</th>
            <th>Klant</th>
            <th>Locatie</th>
            <th>Payment</th>
            <th>Agenda</th>
            <th>Actie</th>
          </tr>
        </thead>
        <tbody data-bookings>
          <tr><td colspan="8">Nog geen data geladen.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const form = document.querySelector("[data-token-form]");
    const tbody = document.querySelector("[data-bookings]");
    const statusNode = document.querySelector("[data-status]");
    let adminToken = "";

    function setStatus(message, isError = false) {
      statusNode.textContent = message;
      statusNode.style.color = isError ? "#ff9c9a" : "#bcb5ba";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("nl-NL", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function formatMoney(cents) {
      return new Intl.NumberFormat("nl-NL", {
        style: "currency",
        currency: "EUR"
      }).format((Number(cents) || 0) / 100);
    }

    async function loadBookings() {
      setStatus("Bookings laden...");
      const response = await fetch("/api/admin/bookings", {
        headers: { authorization: `Bearer ${adminToken}` }
      });
      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Bookings konden niet worden geladen.");
      }

      if (!payload.bookings.length) {
        tbody.innerHTML = '<tr><td colspan="8">Geen boekingen gevonden.</td></tr>';
        setStatus("Geen boekingen.");
        return;
      }

      tbody.innerHTML = payload.bookings.map((booking) => `
        <tr>
          <td><span class="badge ${escapeHtml(booking.status)}">${escapeHtml(booking.status)}</span></td>
          <td>${escapeHtml(formatDate(booking.startUtc))}</td>
          <td>
            ${escapeHtml(booking.bookingTypeLabel)}<br>
            ${escapeHtml(booking.durationMinutes || "-")} min / ${escapeHtml(booking.slotCount || 1)} blok
          </td>
          <td>
            ${escapeHtml(booking.customer.name)}<br>
            ${escapeHtml(booking.customer.email)}<br>
            ${escapeHtml(booking.customer.phone)}
          </td>
          <td>${escapeHtml(booking.customer.location)}</td>
          <td>
            ${escapeHtml(booking.molliePaymentId || "-")}<br>
            ${escapeHtml(formatMoney(booking.priceCents || 0))} totaal<br>
            ${escapeHtml(formatMoney(booking.travelCostCents || 0))} reis
          </td>
          <td>${escapeHtml(booking.caldavEventUid || booking.calendarUrl || "-")}</td>
          <td><button class="cancel-btn" type="button" data-cancel="${escapeHtml(booking.id)}">Cancel</button></td>
        </tr>
      `).join("");
      setStatus(`${payload.bookings.length} boekingen geladen.`);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      adminToken = new FormData(form).get("token");
      try {
        await loadBookings();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    tbody.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-cancel]");
      if (!button) {
        return;
      }

      const bookingId = button.getAttribute("data-cancel");
      button.disabled = true;
      setStatus("Booking annuleren...");

      try {
        const response = await fetch(`/api/admin/bookings/${encodeURIComponent(bookingId)}/cancel`, {
          method: "POST",
          headers: { authorization: `Bearer ${adminToken}` }
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Annuleren mislukt.");
        }
        await loadBookings();
      } catch (error) {
        setStatus(error.message, true);
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
