<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HOME | MarcsMusic</title>
  <meta name="description" content="Responsive MarcsMusic homepage clone with artist hero, album player and newsletter signup.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2321171d'/%3E%3Cpath d='M6 21V9h3l4 5 4-5h3v12h-3V14l-4 5-4-5v7H6Z' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      --page: #ffffff;
      --paper: #f4f4fb;
      --ink: #21171d;
      --charcoal: #2c2b2b;
      --panel: #21171d;
      --panel-soft: #342832;
      --muted: #958d94;
      --line: #6c6068;
      --white: #ffffff;
      --cta: #f34340;
      --cta-dark: #d93432;
      --focus: #69a4ff;
      --spotify: #1ed760;
      --social: #0598d8;
      --social-dark: #076aa8;
      --blue: #477bdc;
      --nav-soft: #f3f3f3;
      --social-copy-bg: #151515;
      --social-copy: #8d8d8d;
      --social-ink: #001018;
      --spotify-ink: #001b0a;
      --font: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      scroll-padding-top: 96px;
    }

    body {
      margin: 0;
      min-width: 320px;
      overflow-x: hidden;
      background: var(--page);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.45;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    [hidden] {
      display: none !important;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      transform: translateY(-150%);
      background: var(--white);
      color: var(--ink);
      padding: 10px 14px;
      border: 1px solid var(--ink);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 88px;
      background: var(--charcoal);
      color: var(--white);
    }

    .header-inner {
      width: min(980px, calc(100% - 48px));
      min-height: 88px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 180px 1fr;
      align-items: center;
      gap: 48px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: 160px;
      height: 78px;
    }

    .brand img {
      width: 160px;
      height: auto;
    }

    .site-nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 128px;
    }

    .site-nav a {
      font-size: 14px;
      font-weight: 300;
      color: var(--nav-soft);
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0.82;
    }

    .site-nav a:hover,
    .site-nav a[aria-current="page"] {
      opacity: 1;
      color: var(--white);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 1210px;
      background: var(--page);
    }

    .hero-visual {
      position: relative;
      min-height: 1210px;
      background-color: var(--paper);
      background-image: url("assets/artist-portrait.jpg");
      background-size: cover;
      background-position: center top;
      overflow: hidden;
    }

    .hero-logo {
      position: absolute;
      z-index: 1;
      top: 184px;
      left: 46px;
      width: 300px;
      max-width: calc(100% - 92px);
      height: auto;
      mix-blend-mode: multiply;
    }

    .release-column {
      background: var(--page);
      padding: 12px 0 0 20px;
    }

    .player-shell {
      width: min(458px, calc(100% - 40px));
      margin: 0 0 0 0;
    }

    .album-player {
      background: var(--panel);
      color: var(--white);
      padding: 16px 20px 20px;
    }

    .player-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .outline-btn {
      min-height: 41px;
      padding: 10px 14px;
      border: 1px solid var(--white);
      background: transparent;
      color: var(--white);
      border-radius: 0;
      font-size: 14px;
      text-align: center;
    }

    .outline-btn:hover {
      background: var(--white);
      color: var(--panel);
    }

    .spotify-player {
      display: block;
      width: 100%;
      height: 352px;
      border: 0;
      background: var(--panel-soft);
    }

    .spotify-note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .instagram-section {
      margin-top: 42px;
      color: var(--ink);
    }

    .instagram-embed-frame {
      border: 1px solid var(--line);
      background: var(--paper);
      padding: 10px;
      min-height: 86px;
    }

    .instagram-embed-frame .instagram-media {
      min-width: 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      margin: 0 auto !important;
    }

    .social-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      transform: translateY(1px);
    }

    .social-link {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-radius: 3px;
      background: var(--social);
      color: var(--social-ink);
      font-weight: 800;
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .social-link.spotify {
      background: var(--spotify);
      color: var(--spotify-ink);
    }

    .social-link.twitter {
      background: var(--social-dark);
      color: var(--social-ink);
    }

    .social-link.power {
      background: var(--blue);
      color: var(--white);
    }

    .social-link:hover {
      filter: brightness(1.08);
    }

    .page-footer {
      min-height: 201px;
      background: var(--panel);
      color: var(--white);
    }

    .footer-inner {
      width: min(900px, calc(100% - 48px));
      min-height: 201px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, 384px) 1fr;
      align-items: center;
      gap: 96px;
    }

    .signup h2 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .signup-form {
      display: grid;
      gap: 10px;
    }

    .signup input {
      width: 100%;
      height: 35px;
      border: 1px solid var(--white);
      border-radius: 0;
      background: transparent;
      color: var(--white);
      padding: 0 10px;
      font-size: 13px;
    }

    .signup input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .subscribe-btn {
      width: 100%;
      min-height: 39px;
      border: 0;
      border-radius: 0;
      background: var(--cta);
      color: var(--white);
      font-size: 13px;
    }

    .subscribe-btn:hover {
      background: var(--cta-dark);
    }

    .copyright {
      justify-self: end;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .header-inner {
        width: min(760px, calc(100% - 32px));
        grid-template-columns: 150px 1fr;
        gap: 24px;
      }

      .brand,
      .brand img {
        width: 142px;
      }

      .site-nav {
        gap: 30px;
      }

      .hero {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .hero-visual {
        min-height: 620px;
        background-size: cover;
        background-position: center top;
      }

      .hero-logo {
        top: 160px;
        left: 28px;
        width: 270px;
        max-width: calc(100% - 56px);
      }

      .release-column {
        padding: 24px 0 56px;
      }

      .player-shell {
        margin: 0 auto;
        width: min(458px, calc(100% - 32px));
      }

      .footer-inner {
        gap: 48px;
      }

    }

    @media (max-width: 720px) {
      html {
        scroll-padding-top: 130px;
      }

      .site-header {
        min-height: 114px;
      }

      .header-inner {
        min-height: 114px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 8px;
      }

      .brand,
      .brand img {
        width: 126px;
      }

      .site-nav {
        width: 100%;
        justify-content: center;
        gap: 22px;
        flex-wrap: wrap;
      }

      .site-nav a {
        font-size: 12px;
      }

      .hero-visual {
        min-height: 520px;
        background-position: 52% top;
      }

      .hero-logo {
        top: 136px;
        left: 18px;
        width: 220px;
        max-width: calc(100% - 36px);
      }

      .album-player {
        padding: 14px;
      }

      .player-actions {
        gap: 10px;
      }

      .outline-btn {
        flex: 1;
        padding-inline: 8px;
        font-size: 13px;
      }

      .spotify-player {
        height: 352px;
      }

      .social-row {
        flex-wrap: wrap;
      }

      .footer-inner {
        width: min(458px, calc(100% - 32px));
        min-height: 260px;
        grid-template-columns: 1fr;
        align-content: center;
        gap: 30px;
      }

      .copyright {
        justify-self: start;
        text-align: left;
      }
    }

    @media (max-width: 420px) {
      .site-nav {
        gap: 14px;
      }

      .hero-visual {
        min-height: 440px;
      }

      .hero-logo {
        top: 124px;
        width: 190px;
      }

      .player-shell {
        width: calc(100% - 20px);
      }

    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to Main Content</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#home" aria-label="MarcsMusic home">
        <img src="assets/marcsmusic-logo-white.png" alt="MarcsMusic">
      </a>
      <nav class="site-nav" aria-label="Site">
        <a href="#home" aria-current="page">Home</a>
        <a href="#music">Music</a>
        <a href="#pics">Pics</a>
        <a href="booking.html">Booking &amp; Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="hero" id="home" aria-label="MarcsMusic homepage">
      <div class="hero-visual">
        <img class="hero-logo" src="assets/marcsmusic-logo-black.png" alt="" aria-hidden="true">
      </div>

      <div class="release-column">
        <div class="player-shell">
          <section class="album-player" id="music" aria-label="Album player">
            <div class="player-actions">
              <a class="outline-btn" href="https://open.spotify.com/playlist/7MAFBX5fE0YFGY1bS3auhy?si=f0c57cc100ff4b00&amp;pt=605fe1b7969f82ba07e1823b8e22cd70" target="_blank" rel="noopener">Open on Spotify</a>
              <a class="outline-btn" href="https://open.spotify.com/playlist/7MAFBX5fE0YFGY1bS3auhy?si=f0c57cc100ff4b00&amp;pt=605fe1b7969f82ba07e1823b8e22cd70" target="_blank" rel="noopener">Share Playlist</a>
            </div>

            <iframe
              class="spotify-player"
              title="Spotify playlist player"
              src="https://open.spotify.com/embed/playlist/7MAFBX5fE0YFGY1bS3auhy?utm_source=generator&amp;theme=0&amp;si=f0c57cc100ff4b00&amp;pt=605fe1b7969f82ba07e1823b8e22cd70"
              width="100%"
              height="352"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
            <p class="spotify-note">Official Spotify playlist embed.</p>
          </section>

          <div class="social-row" aria-label="Social links">
            <a class="social-link spotify" href="https://open.spotify.com/playlist/7MAFBX5fE0YFGY1bS3auhy?si=f0c57cc100ff4b00&amp;pt=605fe1b7969f82ba07e1823b8e22cd70" target="_blank" rel="noopener" aria-label="Listen to playlist on Spotify">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm4.6 14.4c-.2.4-.7.5-1.1.3-3-1.8-6.8-2.2-11.2-1.2-.4.1-.8-.2-.9-.6-.1-.4.2-.8.6-.9 4.8-1.1 9-.6 12.4 1.4.4.2.5.7.2 1Zm1.5-3.2c-.3.4-.8.6-1.3.3-3.4-2.1-8.7-2.7-12.8-1.5-.5.1-1-.1-1.1-.6-.1-.5.1-1 .6-1.1 4.7-1.4 10.5-.7 14.4 1.7.4.3.6.8.2 1.2Zm.1-3.3C14.1 7.5 7.4 7.3 3.6 8.4c-.6.2-1.2-.2-1.3-.7-.2-.6.2-1.2.7-1.3C7.4 5.1 14.7 5.3 19.4 8c.5.3.7 1 .4 1.5-.3.5-1 .7-1.6.4Z"/></svg>
            </a>
            <a class="social-link" href="https://www.instagram.com/marcsmusic_1/" target="_blank" rel="noopener" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7Zm5 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8Zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm5.5-3a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"/></svg>
            </a>
            <a class="social-link twitter" href="https://x.com/MarcsMusic_" target="_blank" rel="noopener" aria-label="X">
              <span aria-hidden="true">X</span>
            </a>
          </div>

          <section class="instagram-section" id="pics" aria-label="Instagram profile">
            <div class="instagram-embed-frame" aria-label="Official Instagram profile embed">
              <blockquote
                class="instagram-media"
                data-instgrm-permalink="https://www.instagram.com/marcsmusic_1/"
                data-instgrm-version="14">
                <a href="https://www.instagram.com/marcsmusic_1/" target="_blank" rel="noopener">View @marcsmusic_1 on Instagram</a>
              </blockquote>
            </div>
          </section>
        </div>
      </div>
    </section>

  </main>

  <footer class="page-footer" id="contact">
    <div class="footer-inner">
      <section class="signup" aria-labelledby="signup-title">
        <h2 id="signup-title">Get on the list</h2>
        <form class="signup-form" data-signup>
          <label class="sr-only" for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="Email Address" autocomplete="email" required>
          <button class="subscribe-btn" type="submit">Subscribe Now</button>
        </form>
      </section>
      <p class="copyright">&copy; 2019 A marcrene.com company</p>
    </div>
  </footer>

  <script async src="https://www.instagram.com/embed.js"></script>
  <script>
    const signupForm = document.querySelector("[data-signup]");

    signupForm?.addEventListener("submit", (event) => {
      event.preventDefault();
      const button = signupForm.querySelector("button");
      const email = signupForm.querySelector("input").value;
      const previous = button.textContent;
      button.disabled = true;
      button.textContent = "Saving...";

      fetch("/api/newsletter/subscribe", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ email })
      })
        .then(async (response) => {
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || "Subscribe failed");
          }
          button.textContent = "Subscribed";
          signupForm.reset();
        })
        .catch(() => {
          button.textContent = "Try Again";
        })
        .finally(() => {
          window.setTimeout(() => {
            button.disabled = false;
            button.textContent = previous;
          }, 1800);
        });
    });
  </script>
</body>
</html>
